version: "3.9"

# Phase 2 – 3-node P2P mesh test harness
# Usage:
#   docker compose -f docker-compose.phase2.yml up --build
#
# Node 1 acts as the bootstrap. Nodes 2 and 3 connect to it on startup.
# After startup:
#   curl http://localhost:8001/network/status   → node1 status
#   curl http://localhost:8002/network/peers    → node2 peers (should show node1)
#   curl http://localhost:8003/network/peers    → node3 peers (should show node1)
#   curl http://localhost:8001/metrics          → Prometheus metrics

networks:
  aura_mesh:
    driver: bridge

services:
  aura-node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-node1
    hostname: aura-node1
    networks:
      - aura_mesh
    ports:
      - "8001:8000"    # API
      - "9001:9000"    # P2P
    environment:
      - OLLAMA_MODEL=llama3.2:3b
      - CHROMA_PATH=/data/chroma_db
      - INGEST_DIR=/data/documents
      - P2P_HOST=0.0.0.0
      - P2P_PORT=9000
      - P2P_BOOTSTRAP=
      - P2P_MDNS_ENABLED=false   # Disable mDNS inside Docker (use bootstrap instead)
      - P2P_KEY_DIR=/data/identity
    volumes:
      - node1_data:/data

  aura-node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-node2
    hostname: aura-node2
    networks:
      - aura_mesh
    ports:
      - "8002:8000"
      - "9002:9000"
    environment:
      - OLLAMA_MODEL=llama3.2:3b
      - CHROMA_PATH=/data/chroma_db
      - INGEST_DIR=/data/documents
      - P2P_HOST=0.0.0.0
      - P2P_PORT=9000
      # Bootstrap to node1 using Docker service name
      - P2P_BOOTSTRAP=/ip4/aura-node1/tcp/9000/p2p/PLACEHOLDER
      - P2P_MDNS_ENABLED=false
      - P2P_KEY_DIR=/data/identity
    volumes:
      - node2_data:/data
    depends_on:
      - aura-node1

  aura-node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-node3
    hostname: aura-node3
    networks:
      - aura_mesh
    ports:
      - "8003:8000"
      - "9003:9000"
    environment:
      - OLLAMA_MODEL=llama3.2:3b
      - CHROMA_PATH=/data/chroma_db
      - INGEST_DIR=/data/documents
      - P2P_HOST=0.0.0.0
      - P2P_PORT=9000
      - P2P_BOOTSTRAP=/ip4/aura-node1/tcp/9000/p2p/PLACEHOLDER
      - P2P_MDNS_ENABLED=false
      - P2P_KEY_DIR=/data/identity
    volumes:
      - node3_data:/data
    depends_on:
      - aura-node1

volumes:
  node1_data:
  node2_data:
  node3_data:

# Note: Replace PLACEHOLDER in P2P_BOOTSTRAP with node1's actual peer_id after first boot.
# To get node1's peer_id: curl http://localhost:8001/network/status | jq .peer_id
# Then update P2P_BOOTSTRAP and restart node2 and node3.
#
# For automated multi-node tests, use tests/integration/test_p2p.py which
# spins up two in-process nodes on ephemeral ports without Docker.
