version: "3.8"
services:
  phase5_backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app:cached
    command: sh -c "pip install -r backend/phase5_service/requirements.txt && uvicorn backend.phase5_service.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
